<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Мой Сад">
<meta name="theme-color" content="#0c1a0c">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Мой Сад · 21 день</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ТЁМНАЯ ТЕМА (по умолчанию) */
:root{
  --bg:#0a160a;--surf:#111d11;--card:#162016;--brd:#254025;
  --gr:#5fcc66;--gd:#3a7a40;--gold:#e0bb5a;--goldd:#9a7c30;
  --cr:#f0e8cc;--tx:#c8e0b8;--dm:#7aaa6a;--br:#8a5f32;
  --sb:env(safe-area-inset-bottom,16px);
  --fs-xs:12px;--fs-sm:15px;--fs-md:17px;--fs-lg:20px;--fs-xl:26px;--fs-2xl:36px;--fs-3xl:48px;
}

/* СВЕТЛАЯ ТЕМА */
@media(prefers-color-scheme:light){
  :root{
    --bg:#f4f7f0;--surf:#e8ede4;--card:#ffffff;--brd:#c8d8c0;
    --gr:#2a7a30;--gd:#1a5a20;--gold:#8a6010;--goldd:#6a4808;
    --cr:#1a2a1a;--tx:#2a3a2a;--dm:#5a7a50;--br:#7a4a20;
  }
}

html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;font-weight:400;overflow:hidden;font-size:var(--fs-md);line-height:1.5;-webkit-font-smoothing:antialiased}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s ease;padding-bottom:calc(72px + var(--sb))}
.screen.active{opacity:1;pointer-events:all}
.screen.nonav{padding-bottom:0}
.scrl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scrl::-webkit-scrollbar{display:none}
/* WELCOME */
#sw{align-items:center;justify-content:center}
#sw .scrl{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:40px 28px;text-align:center}
.wtree{width:160px;height:180px;margin:0 auto 16px}
.wtitle{font-family:-apple-system,BlinkMacSystemFont,serif;font-size:52px;font-weight:600;color:var(--cr);line-height:.95;margin-bottom:6px}
.wtitle em{color:var(--gr);font-style:normal}
.wline{width:44px;height:1px;background:linear-gradient(90deg,transparent,var(--gd),transparent);margin:16px auto}
.wsub{font-size:16px;color:var(--tx);line-height:1.7;margin-bottom:32px;max-width:280px}
.nlbl{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--dm);margin-bottom:8px;display:block;text-align:left;width:100%;max-width:300px;font-weight:600}
.ninp{width:100%;max-width:300px;background:var(--card);border:2px solid var(--brd);color:var(--cr);font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:22px;font-weight:500;padding:14px 18px;border-radius:10px;outline:none;transition:border-color .2s;margin-bottom:16px}
.ninp:focus{border-color:var(--gd)}.ninp::placeholder{color:var(--dm)}
.btnp{background:var(--gd);border:none;color:#ffffff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:17px 32px;border-radius:12px;cursor:pointer;width:100%;max-width:300px;transition:background .2s}
.btnp:hover{background:var(--gr)}.btnp:disabled{opacity:.35;cursor:not-allowed}
/* HOME */
.hdr{padding:18px 20px 0;display:flex;align-items:flex-start;justify-content:space-between}
.hname{font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:26px;font-weight:700;color:var(--cr)}
.hdlbl{font-size:12px;letter-spacing:1px;color:var(--dm);text-transform:uppercase;margin-bottom:2px;font-weight:600}
.hdbadge{background:var(--card);border:1px solid var(--brd);border-radius:20px;padding:6px 14px;text-align:center}
.hdbadge span{color:var(--gold);font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:22px;display:block;line-height:1;font-weight:700}
.hdbadge small{font-size:13px;color:var(--dm);letter-spacing:0}
.treewrap{width:100%;max-width:280px;margin:4px auto 0;aspect-ratio:13/16}
.wmsg{background:rgba(160,100,20,.15);border:1px solid rgba(180,120,30,.4);border-radius:10px;padding:14px 16px;margin:0 16px 8px;font-size:15px;color:#d0a050;line-height:1.55;display:none}
.wmsg.show{display:block}
.retbanner{background:rgba(94,60,20,.2);border:1px solid rgba(140,90,30,.5);border-radius:10px;padding:14px 16px;margin:0 16px 8px;font-size:15px;color:#d8b070;line-height:1.5;cursor:pointer;display:none;font-weight:500}
.retbanner.show{display:flex;align-items:center;gap:10px}
.retbanner span{flex:1}
.psec{padding:6px 20px 10px}
.prow{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.plbl{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--dm);white-space:nowrap;font-weight:600}
.pbar{flex:1;height:2px;background:var(--brd);border-radius:2px}
.pfill{height:100%;background:linear-gradient(90deg,var(--gd),var(--gr));border-radius:2px;transition:width .7s ease}
.pnum{font-size:20px;font-weight:700;color:var(--gr);white-space:nowrap}
.sname{font-size:16px;font-weight:500;color:var(--tx);text-align:center;margin-bottom:3px}
.timer{text-align:center;font-size:13px;letter-spacing:0;color:var(--dm);margin-bottom:12px}
.tcrd{margin:0 16px 12px;background:var(--card);border:2px solid var(--brd);border-radius:14px;padding:18px;cursor:pointer;transition:border-color .2s,background .2s}
.tcrd:active{background:var(--surf)}.tcrd.dc{border-color:var(--gd);background:rgba(30,60,30,.4)}
.tctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tclbl{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--dm);font-weight:600}
.tcchk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--brd);display:flex;align-items:center;justify-content:center;transition:all .2s}
.tcchk.on{background:var(--gd);border-color:var(--gd)}
.tctit{font-size:22px;font-weight:700;color:var(--cr);margin-bottom:4px}
.tcprev{font-size:15px;color:var(--tx);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* TASK */
.thdr{padding:14px 16px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--brd);flex-shrink:0}
.bbtn{background:none;border:none;color:var(--dm);cursor:pointer;padding:4px;display:flex;align-items:center}
.tdn{font-size:38px;font-weight:700;color:var(--dm);line-height:1;flex-shrink:0}
.thi{flex:1}.twkl{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--dm);margin-bottom:2px;font-weight:600}
.ttit{font-size:22px;font-weight:700;color:var(--cr);line-height:1.2}
.tbody{padding:20px}
.smyslbox{background:var(--surf);border-radius:10px;border-left:3px solid var(--gold);padding:16px;margin-bottom:18px;font-size:15px;color:var(--tx);line-height:1.65}
.techcard{background:var(--card);border:2px solid var(--brd);border-radius:14px;margin-bottom:14px;overflow:hidden}
.techcard.main{border-color:var(--gr)}
.techhdr{padding:14px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.techtag{font-size:11px;letter-spacing:.5px;text-transform:uppercase;padding:4px 10px;border-radius:10px;background:var(--surf);color:var(--dm);white-space:nowrap;margin-top:3px;font-weight:600}
.techcard.main .techtag{background:rgba(42,94,48,.35);color:var(--gr)}
.techname{font-size:18px;font-weight:700;color:var(--cr);line-height:1.2;margin-bottom:4px}
.techwhy{font-size:14px;color:var(--tx);line-height:1.55;padding:0 16px 10px}
.techsteps{padding:0 16px 14px;display:none}
.techsteps.open{display:block}
.steprow{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.stepnum{width:20px;height:20px;border-radius:50%;background:var(--gd);color:var(--cr);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.steptext{font-size:15px;color:var(--tx);line-height:1.55}
.showsteps{background:none;border:none;color:var(--gr);font-size:14px;font-weight:600;letter-spacing:0;cursor:pointer;padding:4px 16px 14px;display:flex;align-items:center;gap:6px}
.notesec{margin-top:6px}
.notelbl{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--dm);margin-bottom:8px;display:block;font-weight:600}
.narea{width:100%;min-height:100px;background:var(--card);border:2px solid var(--brd);border-radius:10px;color:var(--cr);font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:16px;font-weight:400;padding:14px;resize:none;outline:none;transition:border-color .2s;line-height:1.6}
.narea:focus{border-color:var(--gd)}.narea::placeholder{color:var(--dm)}
.cbtn{width:100%;background:var(--gd);border:none;color:#ffffff;font-size:15px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:17px;border-radius:12px;cursor:pointer;margin-top:14px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.cbtn:hover{background:var(--gr)}.cbtn.done{background:rgba(30,80,30,.3);border:2px solid var(--gd);color:var(--gr)}
/* DAYS */
.dhdr{padding:18px 20px 12px;border-bottom:1px solid var(--brd);flex-shrink:0}
.stit{font-size:30px;font-weight:700;color:var(--cr)}
.wsec{padding:0 16px}
.wlbl{font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--dm);padding:16px 4px 8px;display:block;font-weight:700}
.drow{display:flex;align-items:center;gap:14px;padding:13px 4px;border-bottom:1px solid var(--brd);cursor:pointer;border-radius:4px;transition:background .15s}
.drow:active{background:var(--surf)}
.drn{font-size:24px;font-weight:700;color:var(--dm);width:36px;text-align:center;flex-shrink:0}
.dri{flex:1;min-width:0}
.drt{font-size:17px;font-weight:600;color:var(--cr);line-height:1.25;margin-bottom:3px}
.drp{font-size:14px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drck{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--brd);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.drck.on{background:var(--gd);border-color:var(--gd)}
.drow.lk{opacity:.3;cursor:default}.drow.lk:active{background:transparent}
.drow.d1 .drn{color:#7a5030}.drow.d2 .drn{color:#306050}.drow.d3 .drn{color:#5a3080}
/* FEELINGS */
.fhdr{padding:18px 20px 12px;border-bottom:1px solid var(--brd);flex-shrink:0}
.fempty{text-align:center;padding:48px 32px;font-size:16px;color:var(--tx);line-height:1.7}
.fempty big{font-size:48px;display:block;margin-bottom:12px}
.fweek{padding:16px 20px 8px;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--dm);font-weight:700}
.fentry{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--brd);cursor:pointer}
.fentry:active{background:var(--surf)}
.femo{font-size:24px;width:36px;text-align:center;flex-shrink:0}
.fword{font-size:18px;font-weight:600;color:var(--cr);flex:1}
.fdate{font-size:13px;color:var(--dm)}
.fcloud{padding:16px 20px;display:flex;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--brd);margin-bottom:4px}
.fcltag{padding:6px 14px;border-radius:20px;border:1px solid var(--brd);font-size:13px;color:var(--tx);cursor:pointer;transition:all .2s}
.fcltag:active{border-color:var(--gd);color:var(--gr)}
/* FEELING CARD */
.fcard{padding:0}
.fctop{padding:24px 24px 18px;border-bottom:1px solid var(--brd)}
.fcemo{font-size:48px;margin-bottom:8px;display:block}
.fcname{font-size:28px;font-weight:700;color:var(--cr);margin-bottom:6px}
.fcshort{font-size:16px;color:var(--tx);line-height:1.6}
.fcsec{padding:16px 24px;border-bottom:1px solid var(--brd)}
.fcslbl{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--dm);margin-bottom:8px;font-weight:700}
.fcstext{font-size:15px;color:var(--tx);line-height:1.6}
.fcstep{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.fcstepnum{width:22px;height:22px;border-radius:50%;background:rgba(42,94,48,.4);color:var(--gr);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.fcstuck{background:rgba(94,60,20,.2);border:1px solid rgba(140,90,30,.5);border-radius:10px;padding:16px;margin:16px 24px;font-size:15px;color:#e0b870;line-height:1.55}
.fcstuck strong{display:block;font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;color:#d0a050;font-weight:700}
/* GARDEN */
.ghdr{padding:18px 20px 12px;border-bottom:1px solid var(--brd);flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between}
.addbtn{background:none;border:2px solid var(--brd);color:var(--tx);font-size:13px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:9px 16px;border-radius:10px;cursor:pointer;transition:all .2s}
.addbtn:hover{border-color:var(--gd);color:var(--gr)}
.ggrid{padding:16px;display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.gtc{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:14px 10px 12px;text-align:center}
.gtc.me{border-color:var(--gd)}
.gtsvg{width:100%;aspect-ratio:3/4;margin-bottom:8px}
.gtnm{font-size:16px;font-weight:700;color:var(--cr);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gtst{font-size:13px;color:var(--tx)}
.mkcbtn{margin:8px 16px 0;background:none;border:2px solid var(--brd);color:var(--tx);font-size:14px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:14px;border-radius:10px;cursor:pointer;width:calc(100% - 32px);transition:all .2s}
.mkcbtn:hover{border-color:var(--goldd);color:var(--gold)}
/* NAV — 4 items */
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--brd);display:none;padding-bottom:var(--sb)}
#nav.vis{display:flex}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;background:none;border:none;cursor:pointer;gap:4px}
.ni{font-size:22px;line-height:1}.nl{font-size:11px;letter-spacing:.3px;color:var(--dm);text-transform:uppercase;font-weight:500}
.nb.act .nl{color:var(--gr);font-weight:700}
/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:flex-end;justify-content:center;z-index:100;padding-bottom:var(--sb)}
.mbg.open{display:flex}
.mbox{background:var(--card);border:1px solid var(--brd);border-radius:14px 14px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.mpad{padding:28px 24px 32px}
.mtit{font-size:22px;font-weight:700;color:var(--cr);margin-bottom:8px}
.mtxt{font-size:15px;color:var(--tx);line-height:1.6;margin-bottom:16px}
.mcode{background:var(--surf);border:1px solid var(--brd);border-radius:6px;padding:12px;font-family:monospace;font-size:10px;color:var(--gr);word-break:break-all;margin-bottom:12px;min-height:54px;line-height:1.5;cursor:pointer}
.minp{width:100%;background:var(--surf);border:2px solid var(--brd);color:var(--cr);font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:16px;padding:14px;border-radius:10px;outline:none;margin-bottom:8px;transition:border-color .2s}
.minp:focus{border-color:var(--gd)}
.minp.big{font-size:26px;font-weight:600;text-align:center}
.merr{color:#c04040;font-size:12px;margin-bottom:8px;display:none}
.mact{display:flex;gap:8px;margin-top:4px}
.btns{flex:1;background:none;border:2px solid var(--brd);color:var(--tx);font-size:15px;font-weight:500;padding:14px;border-radius:12px;cursor:pointer}
/* CELEBRATION */
.cel{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:200;background:rgba(0,0,0,.88);opacity:0;pointer-events:none;transition:opacity .4s;padding:32px}
.cel.show{opacity:1;pointer-events:all}
.celi{text-align:center;max-width:300px}
.celico{font-size:72px;display:block;margin-bottom:18px;animation:bi .6s ease}
.celt{font-size:30px;font-weight:700;color:var(--cr);margin-bottom:12px}
.celx{font-size:16px;color:var(--tx);line-height:1.6;margin-bottom:26px}
@keyframes bi{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="sw" class="screen nonav">
<div class="scrl"><div id="wtree" class="wtree"></div>
<h1 class="wtitle">Мой<br><em>Сад</em></h1>
<div class="wline"></div>
<p class="wsub">Ты сейчас посадишь зерно себя.<br>Наблюдай за тем, что вырастет.</p>
<label class="nlbl" for="ni">Как тебя звать в этом саду?</label>
<input type="text" id="ni" class="ninp" placeholder="Твоё имя" maxlength="18" autocomplete="off" autocorrect="off" spellcheck="false">
<button class="btnp" id="startBtn" onclick="startApp()" disabled>Посадить зерно</button>
</div></div>

<!-- HOME -->
<div id="sh" class="screen">
<div class="scrl">
<div class="hdr">
  <div><div class="hdlbl">Сад</div><div class="hname" id="hname">—</div></div>
  <div class="hdbadge"><span id="hdnum">1</span><small>/ 21</small></div>
</div>
<div class="treewrap" id="mainTree"></div>
<div class="wmsg" id="wmsg"></div>
<div class="retbanner" id="retbanner" onclick="goReturnDay()"><span id="rettext"></span><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="#c8a060" stroke-width="1.5" stroke-linecap="round"/></svg></div>
<div class="psec">
  <div class="prow"><span class="plbl">Рост</span><div class="pbar"><div class="pfill" id="pfill"></div></div><span class="pnum" id="pnum">0/21</span></div>
  <div class="sname" id="sname">семя в земле</div>
  <div class="timer" id="htimer">посажено только что</div>
</div>
<div class="tcrd" id="tcrd" onclick="openToday()">
  <div class="tctop"><span class="tclbl">Задание дня</span><div class="tcchk" id="tcchk"></div></div>
  <div class="tctit" id="tctit">—</div>
  <div class="tcprev" id="tcprev">—</div>
</div>
</div></div>

<!-- TASK -->
<div id="st" class="screen nonav">
<div class="thdr">
  <button class="bbtn" onclick="closeTask()"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M14 6l-6 5 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  <div class="tdn" id="tdn">1</div>
  <div class="thi"><div class="twkl" id="twkl">Неделя 1</div><div class="ttit" id="ttit">—</div></div>
</div>
<div class="scrl"><div class="tbody" id="tbody"></div></div>
</div>

<!-- DAYS -->
<div id="sd" class="screen">
<div class="dhdr"><div class="stit">21 день</div></div>
<div class="scrl" id="dlist"></div>
</div>

<!-- FEELINGS -->
<div id="sf" class="screen">
<div class="fhdr"><div class="stit">Чувства</div></div>
<div class="scrl" id="flist"></div>
</div>

<!-- GARDEN -->
<div id="sg" class="screen">
<div class="ghdr"><div class="stit">Сад</div><button class="addbtn" onclick="openAddFriend()">+ Подруга</button></div>
<div class="scrl">
  <button class="mkcbtn" onclick="openMyCode()">🌱 Поделиться своим деревом</button>
  <div class="ggrid" id="ggrid"></div>
</div>
</div>

<!-- NAV -->
<nav id="nav">
  <button class="nb act" id="nav-h" onclick="navTo('h')"><span class="ni">🌱</span><span class="nl">Дерево</span></button>
  <button class="nb" id="nav-d" onclick="navTo('d')"><span class="ni">📋</span><span class="nl">Дни</span></button>
  <button class="nb" id="nav-f" onclick="navTo('f')"><span class="ni">💧</span><span class="nl">Чувства</span></button>
  <button class="nb" id="nav-g" onclick="navTo('g')"><span class="ni">🌿</span><span class="nl">Сад</span></button>

// STATE
// ══════════════════════════════════════
const SK="mysad_v4";
let S=(()=>{try{return JSON.parse(localStorage.getItem(SK))||def();}catch{return def();}})();
function def(){return{name:"",plantedAt:null,completed:{},notes:{},friends:[],feelingsLog:[]};}
function save(){localStorage.setItem(SK,JSON.stringify(S));}

let curTaskDay=null,fromScreen="h",timerInt=null;
function getProgress(){return Object.keys(S.completed).filter(k=>S.completed[k]).length;}
function getCurDay(){
  if(!S.plantedAt)return 1;
  return Math.min(Math.max(Math.floor((Date.now()-S.plantedAt)/86400000)+1,1),21);
}
function getPrevIncomplete(){
  const cur=getCurDay();
  for(let i=1;i<cur;i++){if(!S.completed[i])return i;}
  return null;
}
function isWilting(){const d=getCurDay();if(S.completed[d])return false;return new Date().getHours()>=18;}
function getTimer(){
  if(!S.plantedAt)return "";
  const ms=Date.now()-S.plantedAt,d=Math.floor(ms/86400000),h=Math.floor((ms%86400000)/3600000),m=Math.floor((ms%3600000)/60000);
  if(d>0)return `посажено ${d} дн. ${h} ч. назад`;
  if(h>0)return `посажено ${h} ч. ${m} мин. назад`;
  return `посажено ${m} мин. назад`;
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+id).classList.add("active");
  const noNav=["w","t"];
  document.getElementById("nav").classList.toggle("vis",!noNav.includes(id));
  document.querySelectorAll(".nb").forEach(b=>b.classList.remove("act"));
  const nb=document.getElementById("nav-"+id);if(nb)nb.classList.add("act");
}
function navTo(id){
  show(id);
  if(id==="h")renderHome();
  if(id==="d")renderDays();
  if(id==="f")renderFeelings();
  if(id==="g")renderGarden();
}
function goReturnDay(){
  const d=getPrevIncomplete();if(d)openTask(d,"h");
}

const ni=document.getElementById("ni");
ni.addEventListener("input",()=>{document.getElementById("startBtn").disabled=ni.value.trim().length<2;});
ni.addEventListener("keydown",e=>{if(e.key==="Enter"&&ni.value.trim().length>=2)startApp();});

}

function initMain(){show("h");renderHome();renderDays();renderFeelings();renderGarden();startTick();}
function startTick(){
  if(timerInt)clearInterval(timerInt);
  timerInt=setInterval(()=>{const te=document.getElementById("htimer");if(te)te.textContent=getTimer();refreshWilt();},60000);
}

function renderHome(){
  const prog=getProgress(),curDay=getCurDay(),wilt=isWilting();
  document.getElementById("hname").textContent=S.name||"—";
  document.getElementById("hdnum").textContent=curDay;
  document.getElementById("mainTree").innerHTML=tree(prog,wilt);
  document.getElementById("pfill").style.width=(prog/21*100)+"%";
  document.getElementById("pnum").textContent=prog+"/21";
  document.getElementById("sname").textContent=STAGES[prog]||"";
  document.getElementById("htimer").textContent=getTimer();
  refreshWilt();
  const prev=getPrevIncomplete();
  const rb=document.getElementById("retbanner");
  if(prev&&prev<curDay){
    rb.classList.add("show");
    document.getElementById("rettext").textContent=`День ${prev} остался незавершённым — вернуться?`;
  }else{rb.classList.remove("show");}
  const td=DAYS[curDay-1];
  if(td){
    const done=!!S.completed[curDay];
    document.getElementById("tctit").textContent=td.title;
    document.getElementById("tcprev").textContent=td.smysl;
    document.getElementById("tcrd").classList.toggle("dc",done);
    const chk=document.getElementById("tcchk");
    chk.classList.toggle("on",done);
    chk.innerHTML=done?`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:"";
  }
}
function refreshWilt(){
  const w=isWilting(),el=document.getElementById("wmsg");if(!el)return;
  el.classList.toggle("show",w);
  if(w)el.textContent=WMSGS[Math.floor(Date.now()/86400000)%WMSGS.length];
}
function openToday(){openTask(getCurDay(),"h");}

const WNS=["","Неделя 1 · Найти себя","Неделя 2 · Выбирать себя","Неделя 3 · Самооценка"];
function openTask(day,from){
  const dd=DAYS[day-1];if(!dd)return;
  curTaskDay=day;fromScreen=from||"h";
  document.getElementById("tdn").textContent=day;
  document.getElementById("twkl").textContent=WNS[dd.w];
  document.getElementById("ttit").textContent=dd.title;
  const done=!!S.completed[day];
  const note=S.notes[day]||"";
  document.getElementById("tbody").innerHTML=buildTaskBody(dd,done,note);
  document.getElementById("tbody").querySelector(".narea").oninput=function(){S.notes[day]=this.value;save();};
  show("t");
}
function buildTaskBody(dd,done,note){
  function techHTML(t,isMain){
    const id="tech"+Math.random().toString(36).slice(2);
    return `<div class="techcard${isMain?" main":""}">
<div class="techhdr">
  <div><div class="techname">${t.name}</div><div class="techwhy">${t.why}</div></div>
  <span class="techtag">${t.tag}</span>
</div>
<button class="showsteps" onclick="toggleSteps('${id}',this)">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
  Как делать
</button>
<div class="techsteps" id="${id}">
  ${t.steps.map((s,i)=>`<div class="steprow"><div class="stepnum">${i+1}</div><div class="steptext">${s}</div></div>`).join("")}
</div></div>`;
  }
  return `
<div class="smyslbox">${dd.smysl}</div>
${techHTML(dd.main,true)}
${techHTML(dd.extra,false)}
<div class="notesec">
<label class="notelbl">${dd.p}</label>
<textarea class="narea" placeholder="Пиши сюда..." rows="4">${note}</textarea>
<button class="cbtn${done?" done":""}" id="cbtn" onclick="toggleComplete()">
  <span id="cbtntxt">${done?"✓ Выполнено — нажми чтобы отменить":"Отметить выполненным"}</span>
</button>
</div>`;
}
function toggleSteps(id,btn){
  const el=document.getElementById(id);
  el.classList.toggle("open");
  btn.innerHTML=el.classList.contains("open")
    ?`<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M11 9l-4-4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Скрыть`
    :`<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Как делать`;
}
function toggleComplete(){
  if(!curTaskDay)return;
  const was=!!S.completed[curTaskDay];
  if(!was){
    S.completed[curTaskDay]=Date.now();save();
    const cbtn=document.getElementById("cbtn");
    const ctxt=document.getElementById("cbtntxt");
    if(cbtn)cbtn.classList.add("done");
    if(ctxt)ctxt.textContent="✓ Выполнено — нажми чтобы отменить";
    showEveningPrompt();
    setTimeout(()=>{renderHome();renderDays();renderGarden();},150);
  }else{
    delete S.completed[curTaskDay];save();
    const cbtn=document.getElementById("cbtn");
    const ctxt=document.getElementById("cbtntxt");
    if(cbtn)cbtn.classList.remove("done");
    if(ctxt)ctxt.textContent="Отметить выполненным";
    renderHome();renderDays();renderGarden();
  }
}
function closeTask(){navTo(fromScreen);}

function showEveningPrompt(){
  const dd=DAYS[curTaskDay-1];if(!dd)return;
  document.getElementById("mbox").innerHTML=`<div class="mpad">
<div class="mtit">Вечерний вопрос</div>
<div class="mtxt">${dd.evening}</div>
<input type="text" class="minp big" id="eword" placeholder="одно слово" maxlength="30" autocomplete="off" spellcheck="false">
<div class="mact">
<button class="btnp" onclick="saveEveningWord()" style="max-width:none">Сохранить</button>
<button class="btns" onclick="closeModal()">Пропустить</button>
</div></div>`;
  document.getElementById("modal").classList.add("open");
  setTimeout(()=>{const el=document.getElementById("eword");if(el)el.focus();},150);
  showCel(getProgress());
}
function saveEveningWord(){
  const inp=document.getElementById("eword");if(!inp)return;
  const word=inp.value.trim().toLowerCase();
  if(!word){closeModal();return;}
  const feeling=matchFeeling(word);
  const entry={date:Date.now(),word:word,feeling:feeling?feeling.id:null,day:curTaskDay};
  S.feelingsLog.unshift(entry);save();
  if(feeling){
    closeModal();
    setTimeout(()=>showFeelingCard(feeling),200);
  }else{
    closeModal();
  }
}
function matchFeeling(word){
  const w=word.toLowerCase().trim();
  for(const f of FEELINGS){
    if(f.triggers.some(t=>w.includes(t)||t.includes(w)))return f;
  }
  return null;
}

  document.getElementById("mbox").innerHTML=`

</div>

</div>

// ══════════════════════════════════════
function renderFeelings(){
  const cont=document.getElementById("flist");
  if(!S.feelingsLog||S.feelingsLog.length===0){
    cont.innerHTML=`<div class="fempty"><big>💧</big>Здесь будут собираться твои чувства.<br><br>После каждого выполненного задания приложение спросит одно слово — что есть в теле.<br><br>Со временем ты увидишь свои паттерны.</div>`;
    return;
  }
  const cloud={};
  S.feelingsLog.forEach(e=>{if(e.feeling){cloud[e.feeling]=(cloud[e.feeling]||0)+1;}});
  const cloudTags=Object.entries(cloud).sort((a,b)=>b[1]-a[1]).map(([id,count])=>{
    const f=FEELINGS.find(x=>x.id===id);
    if(!f)return "";
    return `<span class="fcltag" onclick="showFeelingCard(FEELINGS.find(x=>x.id==='${id}'))">${f.emoji} ${f.name} ${count>1?"x"+count:""}</span>`;
  }).join("");
  const entries=S.feelingsLog.map(e=>{
    const f=e.feeling?FEELINGS.find(x=>x.id===e.feeling):null;
    const date=new Date(e.date);
    const dstr=date.toLocaleDateString("ru-RU",{day:"numeric",month:"short"});
    return `<div class="fentry" onclick="${f?("showFeelingCard(FEELINGS.find(x=>x.id==='"+f.id+"'))"):"void 0"}">
<div class="femo">${f?f.emoji:"💭"}</div>
<div class="fword">${e.word}</div>
<div class="fdate">${dstr}</div>
</div>`;
  }).join("");
  cont.innerHTML=(cloudTags?`<div class="fcloud">${cloudTags}</div>`:``)+"<div>"+entries+"</div>";
}

// ══════════════════════════════════════
// GARDEN
// ══════════════════════════════════════
function renderGarden(){
  const prog=getProgress(),wilt=isWilting();
  const me=`<div class="gtc me"><div class="gtsvg">${tree(prog,wilt)}</div><div class="gtnm">${S.name||"—"}</div><div class="gtst">${STAGES[prog]}</div></div>`;
  const friends=S.friends.map(f=>`<div class="gtc"><div class="gtsvg">${tree(f.p||0,false)}</div><div class="gtnm">${f.n}</div><div class="gtst">${STAGES[f.p||0]}</div></div>`).join("");
  document.getElementById("ggrid").innerHTML=me+friends;
}
function myCode(){return btoa(unescape(encodeURIComponent(JSON.stringify({n:S.name,p:getProgress(),t:Date.now()}))));}
function openMyCode(){
  const code=myCode();
  document.getElementById("mbox").innerHTML=`<div class="mpad"><div class="mtit">Мой код</div><div class="mtxt">Скопируй и отправь подруге. Она вставит его у себя в Саду и увидит твоё дерево. Обновляй код раз в несколько дней.</div><div class="mcode" id="codeBox" onclick="doCopy(\`${code}\`)">${code}</div><div class="mact"><button class="btnp" onclick="doCopy(\`${code}\`)" style="max-width:none">Скопировать</button><button class="btns" onclick="closeModal()">Закрыть</button></div></div>`;
  document.getElementById("modal").classList.add("open");
}
function doCopy(txt){
  navigator.clipboard.writeText(txt).catch(()=>{const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);});
  const box=document.getElementById("codeBox");if(box){box.style.color="var(--gold)";box.textContent="✓ Скопировано!";}
}
function openAddFriend(){
  document.getElementById("mbox").innerHTML=`<div class="mpad"><div class="mtit">Добавить подругу</div><div class="mtxt">Попроси подругу открыть Сад → «Поделиться своим деревом» → скопировать код и отправить тебе. Вставь код сюда.</div><input type="text" class="minp" id="fc" placeholder="Вставь код сюда..." autocomplete="off" spellcheck="false"><div class="merr" id="ferr">Код не распознан. Попробуй снова.</div><div class="mact"><button class="btnp" onclick="addFriend()" style="max-width:none">Добавить</button><button class="btns" onclick="closeModal()">Отмена</button></div></div>`;
  document.getElementById("modal").classList.add("open");
  setTimeout(()=>{const fc=document.getElementById("fc");if(fc)fc.focus();},100);
}
function addFriend(){
  const inp=document.getElementById("fc");if(!inp)return;
  try{
    const data=JSON.parse(decodeURIComponent(escape(atob(inp.value.trim()))));
    if(!data.n)throw new Error("bad");
    const ex=S.friends.findIndex(f=>f.n===data.n);
    if(ex>=0){S.friends[ex].p=data.p||0;}else{S.friends.push({n:data.n,p:data.p||0});}
    save();closeModal();renderGarden();
  }catch{const e=document.getElementById("ferr");if(e)e.style.display="block";}
}

// ══════════════════════════════════════
// MODAL
// ══════════════════════════════════════
function closeMBG(e){if(e.target===document.getElementById("modal"))closeModal();}
function closeModal(){document.getElementById("modal").classList.remove("open");}

// ══════════════════════════════════════
// BOOT
// ══════════════════════════════════════
if(S.name&&S.plantedAt){initMain();}else{show("w");}
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
</script>
