<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Мой Сад">
<meta name="theme-color" content="#0c1a0c">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Мой Сад · 21 день</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0c1a0c;--surf:#101e10;--card:#152015;--brd:#1c301c;
  --gr:#4aaa50;--gd:#2a5e30;--gold:#c8a84a;--goldd:#7a6020;
  --cr:#e8d8b0;--tx:#8aaa78;--dm:#3a5a3a;--br:#7a4f2a;
  --sb:env(safe-area-inset-bottom,16px);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Jost',sans-serif;font-weight:300;overflow:hidden}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s ease;padding-bottom:calc(64px + var(--sb))}
.screen.active{opacity:1;pointer-events:all}
.screen.nonav{padding-bottom:0}
.scrl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scrl::-webkit-scrollbar{display:none}

/* WELCOME */
#sw{align-items:center;justify-content:center}
#sw .scrl{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:40px 28px;text-align:center}
.wtree{width:180px;height:200px;margin:0 auto 16px}
.wtitle{font-family:'Cormorant Garamond',serif;font-size:58px;font-weight:300;color:var(--cr);line-height:.88;margin-bottom:6px}
.wtitle em{color:var(--gr);font-style:italic}
.wline{width:44px;height:1px;background:linear-gradient(90deg,transparent,var(--gd),transparent);margin:16px auto}
.wsub{font-size:14px;color:var(--dm);line-height:1.7;margin-bottom:32px;max-width:250px}
.nlbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--dm);margin-bottom:8px;display:block;text-align:left;width:100%;max-width:300px}
.ninp{width:100%;max-width:300px;background:var(--card);border:1px solid var(--brd);color:var(--cr);font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;padding:14px 18px;border-radius:6px;outline:none;transition:border-color .2s;margin-bottom:16px}
.ninp:focus{border-color:var(--gd)}.ninp::placeholder{color:var(--dm)}
.btnp{background:var(--gd);border:none;color:var(--cr);font-family:'Jost',sans-serif;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;padding:16px 32px;border-radius:6px;cursor:pointer;width:100%;max-width:300px;transition:background .2s}
.btnp:hover{background:var(--gr)}.btnp:disabled{opacity:.35;cursor:not-allowed}

/* HOME */
.hdr{padding:18px 20px 0;display:flex;align-items:flex-start;justify-content:space-between}
.hname{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--cr)}
.hdlbl{font-size:10px;letter-spacing:2px;color:var(--dm);text-transform:uppercase;margin-bottom:2px}
.hdbadge{background:var(--card);border:1px solid var(--brd);border-radius:20px;padding:6px 14px;text-align:center}
.hdbadge span{color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:20px;display:block;line-height:1}
.hdbadge small{font-size:10px;color:var(--dm);letter-spacing:1px}
.treewrap{width:100%;max-width:300px;margin:4px auto 0;aspect-ratio:13/16}
.wmsg{background:rgba(160,100,20,.1);border:1px solid rgba(180,120,30,.25);border-radius:8px;padding:14px 16px;margin:0 16px 8px;font-size:13px;color:#b89050;line-height:1.55;display:none}
.wmsg.show{display:block}
.psec{padding:6px 20px 10px}
.prow{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.plbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dm);white-space:nowrap}
.pbar{flex:1;height:2px;background:var(--brd);border-radius:2px}
.pfill{height:100%;background:linear-gradient(90deg,var(--gd),var(--gr));border-radius:2px;transition:width .7s ease}
.pnum{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gr);white-space:nowrap}
.sname{font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--dm);text-align:center;margin-bottom:3px}
.timer{text-align:center;font-size:11px;letter-spacing:.5px;color:var(--dm);margin-bottom:12px}
.tcrd{margin:0 16px 12px;background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:18px;cursor:pointer;transition:border-color .2s,background .2s}
.tcrd:active{background:var(--surf)}.tcrd.dc{border-color:var(--gd);background:rgba(30,60,30,.4)}
.tctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tclbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--dm)}
.tcchk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--brd);display:flex;align-items:center;justify-content:center;transition:all .2s}
.tcchk.on{background:var(--gd);border-color:var(--gd)}
.tctit{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--cr);margin-bottom:4px}
.tcprev{font-size:13px;color:var(--dm);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* TASK */
.thdr{padding:14px 16px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--brd);flex-shrink:0}
.bbtn{background:none;border:none;color:var(--dm);cursor:pointer;padding:4px;display:flex;align-items:center}
.tdn{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;color:var(--dm);line-height:1;flex-shrink:0}
.thi{flex:1}.twkl{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--dm);margin-bottom:2px}
.ttit{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--cr);line-height:1.1}
.tbody{padding:20px}
.ttxt{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--cr);line-height:1.58;margin-bottom:14px}
.twhy{font-size:13px;color:var(--dm);line-height:1.65;padding:14px 16px;background:var(--surf);border-radius:6px;border-left:2px solid var(--gd);margin-bottom:20px;font-style:italic}
.nlbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--dm);margin-bottom:8px;display:block}
.narea{width:100%;min-height:110px;background:var(--card);border:1px solid var(--brd);border-radius:6px;color:var(--cr);font-family:'Jost',sans-serif;font-size:15px;font-weight:300;padding:14px;resize:none;outline:none;transition:border-color .2s;line-height:1.55}
.narea:focus{border-color:var(--gd)}.narea::placeholder{color:var(--dm)}
.cbtn{width:100%;background:var(--gd);border:none;color:var(--cr);font-family:'Jost',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:16px;border-radius:6px;cursor:pointer;margin-top:14px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.cbtn:hover{background:var(--gr)}.cbtn.done{background:rgba(30,60,30,.5);border:1px solid var(--gd);color:var(--gr)}

/* DAYS */
.dhdr{padding:18px 20px 12px;border-bottom:1px solid var(--brd);flex-shrink:0}
.stit{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;color:var(--cr)}
.wsec{padding:0 16px}
.wlbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--dm);padding:14px 4px 8px;display:block}
.drow{display:flex;align-items:center;gap:14px;padding:13px 4px;border-bottom:1px solid var(--brd);cursor:pointer;border-radius:4px;transition:background .15s}
.drow:active{background:var(--surf)}
.drn{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;color:var(--dm);width:36px;text-align:center;flex-shrink:0}
.dri{flex:1;min-width:0}
.drt{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--cr);line-height:1.15;margin-bottom:2px}
.drp{font-size:12px;color:var(--dm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drck{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--brd);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.drck.on{background:var(--gd);border-color:var(--gd)}
.drow.lk{opacity:.3;cursor:default}.drow.lk:active{background:transparent}
.drow.d1 .drn{color:#7a5030}.drow.d2 .drn{color:#306050}.drow.d3 .drn{color:#5a3080}

/* GARDEN */
.ghdr{padding:18px 20px 12px;border-bottom:1px solid var(--brd);flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between}
.addbtn{background:none;border:1px solid var(--brd);color:var(--dm);font-family:'Jost',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:8px 14px;border-radius:4px;cursor:pointer;transition:all .2s}
.addbtn:hover{border-color:var(--gd);color:var(--gr)}
.ggrid{padding:16px;display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.gtc{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:14px 10px 12px;text-align:center}
.gtc.me{border-color:var(--gd)}
.gtsvg{width:100%;aspect-ratio:3/4;margin-bottom:8px}
.gtnm{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--cr);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gtst{font-size:10px;color:var(--dm)}
.mkcbtn{margin:8px 16px 0;background:none;border:1px solid var(--brd);color:var(--dm);font-family:'Jost',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:12px;border-radius:4px;cursor:pointer;width:calc(100% - 32px);transition:all .2s}
.mkcbtn:hover{border-color:var(--goldd);color:var(--gold)}

/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--brd);display:none;padding-bottom:var(--sb)}
#nav.vis{display:flex}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 8px;background:none;border:none;cursor:pointer;gap:3px}
.ni{font-size:20px;line-height:1}.nl{font-size:9px;letter-spacing:1.5px;color:var(--dm);text-transform:uppercase}
.nb.act .nl{color:var(--gr)}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:flex-end;justify-content:center;z-index:100;padding-bottom:var(--sb)}
.mbg.open{display:flex}
.mbox{background:var(--card);border:1px solid var(--brd);border-radius:14px 14px 0 0;padding:28px 24px 32px;width:100%;max-width:480px}
.mtit{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--cr);margin-bottom:8px}
.mtxt{font-size:13px;color:var(--dm);line-height:1.6;margin-bottom:16px}
.mcode{background:var(--surf);border:1px solid var(--brd);border-radius:6px;padding:12px;font-family:monospace;font-size:10px;color:var(--gr);word-break:break-all;margin-bottom:12px;min-height:54px;line-height:1.5;cursor:pointer;transition:color .2s}
.mcode:hover{color:var(--gold)}
.minp{width:100%;background:var(--surf);border:1px solid var(--brd);color:var(--cr);font-family:'Jost',sans-serif;font-size:14px;padding:13px;border-radius:6px;outline:none;margin-bottom:8px;transition:border-color .2s}
.minp:focus{border-color:var(--gd)}
.merr{color:#c04040;font-size:12px;margin-bottom:8px;display:none}
.mact{display:flex;gap:8px;margin-top:4px}
.btns{flex:1;background:none;border:1px solid var(--brd);color:var(--dm);font-family:'Jost',sans-serif;font-size:11px;letter-spacing:1px;padding:13px;border-radius:6px;cursor:pointer;transition:all .2s}
.btns:hover{border-color:var(--dm)}

/* CELEBRATION */
.cel{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:200;background:rgba(0,0,0,.88);opacity:0;pointer-events:none;transition:opacity .4s;padding:32px}
.cel.show{opacity:1;pointer-events:all}
.celi{text-align:center;max-width:300px}
.celico{font-size:72px;display:block;margin-bottom:18px;animation:bi .6s ease}
.celt{font-family:'Cormorant Garamond',serif;font-size:38px;color:var(--cr);margin-bottom:12px}
.celx{font-size:15px;color:var(--tx);line-height:1.6;margin-bottom:26px}
@keyframes bi{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="sw" class="screen nonav">
<div class="scrl">
  <div id="wtree" class="wtree"></div>
  <h1 class="wtitle">Мой<br><em>Сад</em></h1>
  <div class="wline"></div>
  <p class="wsub">Ты сейчас посадишь<br>зерно себя.<br>Наблюдай за тем, что вырастет.</p>
  <label class="nlbl" for="ni">Как тебя звать в этом саду?</label>
  <input type="text" id="ni" class="ninp" placeholder="Твоё имя" maxlength="18" autocomplete="off" autocorrect="off" spellcheck="false">
  <button class="btnp" id="startBtn" onclick="startApp()" disabled>Посадить зерно</button>
</div>
</div>

<!-- HOME -->
<div id="sh" class="screen">
<div class="scrl">
  <div class="hdr">
    <div><div class="hdlbl">Сад</div><div class="hname" id="hname">—</div></div>
    <div class="hdbadge"><span id="hdnum">1</span><small>/ 21</small></div>
  </div>
  <div class="treewrap" id="mainTree"></div>
  <div class="wmsg" id="wmsg"></div>
  <div class="psec">
    <div class="prow">
      <span class="plbl">Рост</span>
      <div class="pbar"><div class="pfill" id="pfill"></div></div>
      <span class="pnum" id="pnum">0/21</span>
    </div>
    <div class="sname" id="sname">семя в земле</div>
    <div class="timer" id="htimer">посажено только что</div>
  </div>
  <div class="tcrd" id="tcrd" onclick="openToday()">
    <div class="tctop"><span class="tclbl">Задание дня</span><div class="tcchk" id="tcchk"></div></div>
    <div class="tctit" id="tctit">—</div>
    <div class="tcprev" id="tcprev">—</div>
  </div>
</div>
</div>

<!-- TASK -->
<div id="st" class="screen nonav">
<div class="thdr">
  <button class="bbtn" onclick="closeTask()">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M14 6l-6 5 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <div class="tdn" id="tdn">1</div>
  <div class="thi"><div class="twkl" id="twkl">Неделя 1</div><div class="ttit" id="ttit">—</div></div>
</div>
<div class="scrl">
<div class="tbody">
  <div class="ttxt" id="ttxt">—</div>
  <div class="twhy" id="twhy">—</div>
  <label class="nlbl" id="tprompt">Заметка:</label>
  <textarea class="narea" id="tnote" placeholder="Пиши сюда..." rows="5"></textarea>
  <button class="cbtn" id="cbtn" onclick="toggleComplete()"><span id="cbtntxt">Отметить выполненным</span></button>
</div>
</div>
</div>

<!-- DAYS -->
<div id="sd" class="screen">
<div class="dhdr"><div class="stit">21 день</div></div>
<div class="scrl" id="dlist"></div>
</div>

<!-- GARDEN -->
<div id="sg" class="screen">
<div class="ghdr">
  <div class="stit">Сад</div>
  <button class="addbtn" onclick="openAddFriend()">+ Подруга</button>
</div>
<div class="scrl">
  <button class="mkcbtn" onclick="openMyCode()">🌱 Поделиться своим деревом</button>
  <div class="ggrid" id="ggrid"></div>
</div>
</div>

<!-- NAV -->
<nav id="nav" class="vis">
  <button class="nb act" id="nav-h" onclick="nav('h')"><span class="ni">🌱</span><span class="nl">Моё дерево</span></button>
  <button class="nb" id="nav-d" onclick="nav('d')"><span class="ni">📋</span><span class="nl">Дни</span></button>
  <button class="nb" id="nav-g" onclick="nav('g')"><span class="ni">🌿</span><span class="nl">Сад</span></button>
</nav>

<!-- MODAL -->
<div class="mbg" id="modal" onclick="closeMBG(event)">
  <div class="mbox" id="mbox" onclick="event.stopPropagation()"></div>
</div>

<!-- CELEBRATION -->
<div class="cel" id="cel" onclick="hideCel()">
<div class="celi">
  <span class="celico" id="celico">🌸</span>
  <div class="celt" id="celt">Новый рост</div>
  <div class="celx" id="celx">—</div>
  <button class="btnp" style="max-width:200px" onclick="hideCel()">Хорошо</button>
</div>
</div>

<script>
// ═══════════════ DATA ═══════════════

const STAGES=['семя в земле','первый росток','первый росток','маленький росток','маленький росток','молодой стебель','молодой стебель','первые ветви','первые ветви','первые ветви','молодое деревце','молодое деревце','молодое деревце','растущее дерево','растущее дерево','растущее дерево','крепкое дерево','крепкое дерево','крепкое дерево','бутоны','бутоны','🌸 дерево расцвело'];

const WMSGS=['День прошёл без полива. Дерево не умирает — оно ждёт тебя.','Пауза — не провал. Корни держат. Что сегодня забрало твоё время?','Дерево терпеливо. Один маленький шаг — и оно снова пойдёт в рост.','Откат — это информация. Что сейчас требует слишком много твоей воды?','Иногда нужно просто ждать дождя. Дерево знает это лучше нас.'];

const GMSGS=[{i:'🌱',t:'Росток тянется',x:'Ты сделала это. Дерево тебя слышит.'},{i:'🍃',t:'Новый лист',x:'Каждое действие — настоящий рост. Не метафора.'},{i:'🌿',t:'Ветка крепнет',x:'Смотри как оно растёт. Это ты его растишь.'},{i:'🌳',t:'Дерево растёт',x:'Ты здесь. Ты делаешь. Этого достаточно.'},{i:'✨',t:'Хорошо',x:'Сегодняшний день посчитан. Он настоящий.'}];

const DAYS=[
{d:1,w:1,title:'Рука на груди',task:'Утром положи руку на грудь. Два медленных вдоха. Одно слово — что сейчас есть в теле? Тяжесть. Пустота. Тепло. Ничего. Без оценки — просто зафиксируй и запиши одно слово.',why:'Тело знает правду раньше головы. Это не упражнение — это просто проверка связи.',p:'Моё слово сегодня:'},
{d:2,w:1,title:'Считать «должна»',task:'Весь день замечай в голове «должна», «надо», «обязана». Не борись с ними — просто считай. Вечером запиши цифру.',why:'Сначала нужно увидеть сколько чужих голосов живёт внутри. Без этого счёта не понять где ты а где они.',p:'Сколько раз я услышала «должна»:'},
{d:3,w:1,title:'Одна любимая вещь',task:'Найди в комнате одну вещь которая нравится именно тебе. Не потому что подарили не потому что «так принято». Просто нравится — форма цвет ощущение. Посмотри на неё молча одну минуту.',why:'Это тренировка различать своё и чужое. Начать можно с вещи — так проще чем с желаний.',p:'Это была:'},
{d:4,w:1,title:'Любимый запах',task:'Вспомни один запах который ты любила — в детстве в другое время в другом месте. Хвоя. Ваниль. Дождь. Старые книги. Можно ли сегодня найти что-то похожее?',why:'Запах — самый прямой путь к себе. Он обходит голову и идёт прямо к памяти тела.',p:'Запах который я вспомнила:'},
{d:5,w:1,title:'Свой вкус',task:'Сегодня один раз поешь или выпьешь то чего хочет тело прямо сейчас. Не что есть. Не что удобно. Что хочется — горячее холодное сладкое? Следуй за этим.',why:'Выбор еды — самый доступный способ вернуть контакт с собственными желаниями.',p:'Я выбрала:'},
{d:6,w:1,title:'Три факта',task:'Напиши три факта о себе. Только факты — не оценки. Не «я хорошая мама» — это оценка. «Я умею варить борщ» — это факт. «Я знаю дорогу в парк». «Я пережила этот день».',why:'Самооценка строится на фундаменте фактов а не оценок. Начинаем строить.',p:'Мои три факта:'},
{d:7,w:1,title:'Итог первой недели',task:'Перечитай всё что написала за эту неделю. Один вопрос: был ли хоть один момент где ты услышала именно себя — не чужой голос не «должна» а своё? Запиши этот момент.',why:'Первая неделя сделана. Семя посажено. Росток пробился сквозь землю — это уже произошло.',p:'Момент где я услышала себя:'},
{d:8,w:2,title:'Мой выбор',task:'Сегодня сделай один маленький выбор только для себя. Какую чашку взять. Куда сесть. В каком порядке делать дела. Что угодно — главное что это именно твоё решение а не «как принято».',why:'Воля восстанавливается через действие. Не через понимание — через действие. Одно маленькое — достаточно.',p:'Мой выбор сегодня:'},
{d:9,w:2,title:'10 минут',task:'Когда кто-то попросит тебя что-то сделать — ответь: «Я сделаю через 10 минут». И засеки. Не объясняй почему. Просто пауза между чужим импульсом и твоим ответом.',why:'Эта пауза — не отказ. Это пространство где ты существуешь. Оно твоё по праву.',p:'Как прошло:'},
{d:10,w:2,title:'Выйти без цели',task:'Выйди на улицу на 5–10 минут. Без цели без дела без списка. Просто потому что тело хочет пространства и воздуха. Можно просто постоять у подъезда.',why:'Тело знает что мир больше комнаты. Напомни ему об этом.',p:'Что я заметила:'},
{d:11,w:2,title:'Моё умение',task:'Найди одно конкретное умение которое есть только у тебя. Не роль («я мать») не оценку («я добрая»). Конкретное: «Я умею слышать когда человеку плохо раньше чем он скажет». «Я умею найти выход когда денег нет».',why:'Это не похвальба. Это инвентаризация. Ты идёшь дальше — нужно знать что берёшь с собой.',p:'Моё умение:'},
{d:12,w:2,title:'Одно отложенное дело',task:'Сделай одно маленькое дело которое откладывалось. Переставить вещь. Выбросить старое. Написать сообщение. Важен не масштаб — важно что ты выбрала это сама.',why:'Каждое завершённое дело возвращает немного энергии обратно. Не тратит — возвращает.',p:'Я сделала:'},

{d:15,w:3,title:'Я справилась',task:'Напиши одно предложение: «Я справилась с ____». Что угодно. Вышла из дома. Ответила на трудное сообщение. Выжила в тяжёлый день. Не нужен героизм — нужен факт.',why:'Самооценка строится не на достижениях — она строится на свидетельстве. Будь своим свидетелем.',p:'Я справилась с:'},

// ═══════════════ STATE ═══════════════

const SK = 'mysad_v3';
let S = (() => { try { return JSON.parse(localStorage.getItem(SK)) || def(); } catch { return def(); } })();
function def() { return {name:'',plantedAt:null,completed:{},notes:{},friends:[]}; }
function save() { localStorage.setItem(SK, JSON.stringify(S)); }

let curTaskDay = null;
let fromScreen = 'h';
let timerInt = null;

function getProgress() { return Object.keys(S.completed).filter(k => S.completed[k]).length; }
function getCurDay() {
  if (!S.plantedAt) return 1;
  return Math.min(Math.max(Math.floor((Date.now()-S.plantedAt)/86400000)+1,1),21);
}
function isWilting() {
  const d = getCurDay();
  if (S.completed[d]) return false;
  return new Date().getHours() >= 18;
}
function getTimer() {
  if (!S.plantedAt) return '';
  const ms = Date.now()-S.plantedAt;
  const d = Math.floor(ms/86400000);
  const h = Math.floor((ms%86400000)/3600000);
  const m = Math.floor((ms%3600000)/60000);
  if (d>0) return `посажено ${d} дн. ${h} ч. назад`;
  if (h>0) return `посажено ${h} ч. ${m} мин. назад`;
  return `посажено ${m} мин. назад`;
}

// ═══════════════ SCREENS ═══════════════

function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+id).classList.add('active');
  const noNav=['w','t'];
  document.getElementById('nav').classList.toggle('vis',!noNav.includes(id));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('act'));
  const nb=document.getElementById('nav-'+id);
  if(nb) nb.classList.add('act');
}

function nav(id) {
  show(id);
  if(id==='h') renderHome();
  if(id==='d') renderDays();
  if(id==='g') renderGarden();
}

// ═══════════════ WELCOME ═══════════════

document.getElementById('wtree').innerHTML = tree(0, false);
const ni = document.getElementById('ni');
ni.addEventListener('input', ()=>{ document.getElementById('startBtn').disabled=ni.value.trim().length<2; });
ni.addEventListener('keydown', e=>{ if(e.key==='Enter'&&ni.value.trim().length>=2) startApp(); });

function startApp() {
  const name = ni.value.trim();
  if(name.length<2) return;
  S.name=name; S.plantedAt=Date.now(); save();
  initMain();
}

// ═══════════════ INIT ═══════════════

function initMain() {
  show('h'); renderHome(); renderDays(); renderGarden(); startTick();
}

function startTick() {
  if(timerInt) clearInterval(timerInt);
  timerInt = setInterval(()=>{
    const te=document.getElementById('htimer'); if(te) te.textContent=getTimer();
    refreshWilt();
  }, 60000);
}

// ═══════════════ HOME ═══════════════

function renderHome() {
  const prog = getProgress();
  const curDay = getCurDay();
  const wilt = isWilting();
  document.getElementById('hname').textContent = S.name||'—';
  document.getElementById('hdnum').textContent = curDay;
  document.getElementById('mainTree').innerHTML = tree(prog, wilt);
  document.getElementById('pfill').style.width = (prog/21*100)+'%';
  document.getElementById('pnum').textContent = prog+'/21';
  document.getElementById('sname').textContent = STAGES[prog]||'';
  document.getElementById('htimer').textContent = getTimer();
  refreshWilt();
  const td = DAYS[curDay-1];
  if(td) {
    const done = !!S.completed[curDay];
    document.getElementById('tctit').textContent = td.title;
    document.getElementById('tcprev').textContent = td.task;
    document.getElementById('tcrd').classList.toggle('dc', done);
    const chk = document.getElementById('tcchk');
    chk.classList.toggle('on', done);
    chk.innerHTML = done?`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:'';
  }
}

function refreshWilt() {
  const w = isWilting();
  const el = document.getElementById('wmsg');
  if(!el) return;
  el.classList.toggle('show', w);
  if(w) el.textContent = WMSGS[Math.floor(Date.now()/86400000)%WMSGS.length];
}

function openToday() { openTask(getCurDay(),'h'); }

// ═══════════════ TASK ═══════════════

const WNS = ['','Неделя 1 · Найти себя','Неделя 2 · Выбирать себя','Неделя 3 · Самооценка'];

function openTask(day, from) {
  const dd = DAYS[day-1]; if(!dd) return;
  curTaskDay=day; fromScreen=from||'h';
  document.getElementById('tdn').textContent=day;
  document.getElementById('twkl').textContent=WNS[dd.w];
  document.getElementById('ttit').textContent=dd.title;
  document.getElementById('ttxt').textContent=dd.task;
  document.getElementById('twhy').textContent=dd.why;
  document.getElementById('tprompt').textContent=dd.p;
  const na=document.getElementById('tnote');
  na.value=S.notes[day]||'';
  na.oninput=()=>{ S.notes[day]=na.value; save(); };
  updateCompBtn(!!S.completed[day]);
  show('t');
}

function updateCompBtn(done) {
  const btn=document.getElementById('cbtn');
  const txt=document.getElementById('cbtntxt');
  btn.classList.toggle('done',done);
  txt.textContent=done?'✓ Выполнено — нажми чтобы отменить':'Отметить выполненным';
}

function toggleComplete() {
  if(!curTaskDay) return;
  const was=!!S.completed[curTaskDay];
  if(!was) {
    S.completed[curTaskDay]=Date.now(); save();
    updateCompBtn(true);
    showCel(getProgress());
    setTimeout(()=>{ renderHome(); renderDays(); renderGarden(); },150);
  } else {
    delete S.completed[curTaskDay]; save();
    updateCompBtn(false);
    renderHome(); renderDays(); renderGarden();
  }
}

function closeTask() {
  nav(fromScreen);
}

// ═══════════════ CELEBRATION ═══════════════

function showCel(prog) {
  const msg = prog===21
    ? {i:'🌸',t:'Дерево расцвело!',x:'Ты прошла все 21 день. Ты вырастила это дерево сама. Из семени — своими руками.'}
    : GMSGS[Math.floor(Math.random()*GMSGS.length)];
  document.getElementById('celico').textContent=msg.i;
  document.getElementById('celt').textContent=msg.t;
  document.getElementById('celx').textContent=msg.x;
  document.getElementById('cel').classList.add('show');
}
function hideCel() { document.getElementById('cel').classList.remove('show'); }

// ═══════════════ DAYS ═══════════════

function renderDays() {
  const cont=document.getElementById('dlist');
  const cur=getCurDay();
  const weeks=[
    {w:1,lbl:'Неделя 1 · Найти себя'},
    {w:2,lbl:'Неделя 2 · Выбирать себя'},
    {w:3,lbl:'Неделя 3 · Самооценка'}
  ];
  cont.innerHTML=weeks.map(wk=>`
    <div class="wsec"><span class="wlbl">${wk.lbl}</span>
    ${DAYS.filter(d=>d.w===wk.w).map(d=>{
      const done=!!S.completed[d.d];
      const locked=d.d>cur;
      const note=S.notes[d.d]?`"${S.notes[d.d].substring(0,32)}${S.notes[d.d].length>32?'...':''}"`:d.task.substring(0,36)+'...';
      return `<div class="drow${locked?' lk':''}${done?' d'+d.w:''}" onclick="${locked?'':('openTask('+d.d+',"d")')}">
        <div class="drn">${d.d}</div>
        <div class="dri"><div class="drt">${d.title}</div><div class="drp">${note}</div></div>
        <div class="drck${done?' on':''}">${done?`<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}</div>
      </div>`;
    }).join('')}</div>`).join('');
}

// ═══════════════ GARDEN ═══════════════

function renderGarden() {
  const prog=getProgress(); const wilt=isWilting();
  const me=`<div class="gtc me"><div class="gtsvg">${tree(prog,wilt)}</div><div class="gtnm">${S.name||'—'}</div><div class="gtst">${STAGES[prog]}</div></div>`;
  const friends=S.friends.map(f=>`<div class="gtc"><div class="gtsvg">${tree(f.p||0,false)}</div><div class="gtnm">${f.n}</div><div class="gtst">${STAGES[f.p||0]}</div></div>`).join('');
  document.getElementById('ggrid').innerHTML=me+friends;
}

function myCode() {
  return btoa(unescape(encodeURIComponent(JSON.stringify({n:S.name,p:getProgress(),t:Date.now()}))));
}

function openMyCode() {
  const code=myCode();
  document.getElementById('mbox').innerHTML=`<div class="mtit">Мой код</div><div class="mtxt">Скопируй и отправь подруге. Она вставит его у себя в Саду — и увидит твоё дерево. Обновляй код раз в несколько дней чтобы подруга видела актуальный прогресс.</div><div class="mcode" id="codeBox" onclick="doCopy(\`${code}\`)">${code}</div><div class="mact"><button class="btnp" onclick="doCopy(\`${code}\`)" style="max-width:none">Скопировать</button><button class="btns" onclick="closeModal()">Закрыть</button></div>`;
  document.getElementById('modal').classList.add('open');
}

function doCopy(txt) {
  navigator.clipboard.writeText(txt).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=txt; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
  const box=document.getElementById('codeBox');
  if(box){box.style.color='var(--gold)';box.textContent='✓ Скопировано!';}
}

function openAddFriend() {
  document.getElementById('mbox').innerHTML=`<div class="mtit">Добавить подругу</div><div class="mtxt">Попроси подругу открыть Сад → нажать «Поделиться своим деревом» → скопировать код и отправить тебе. Вставь код сюда.</div><input type="text" class="minp" id="fc" placeholder="Вставь код сюда..." autocomplete="off" spellcheck="false"><div class="merr" id="ferr">Код не распознан. Попробуй снова.</div><div class="mact"><button class="btnp" onclick="addFriend()" style="max-width:none">Добавить</button><button class="btns" onclick="closeModal()">Отмена</button></div>`;
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>{const fc=document.getElementById('fc');if(fc)fc.focus();},100);
}

function addFriend() {
  const inp=document.getElementById('fc'); if(!inp) return;
  try {
    const data=JSON.parse(decodeURIComponent(escape(atob(inp.value.trim()))));
    if(!data.n) throw new Error('bad');
    const ex=S.friends.findIndex(f=>f.n===data.n);
    if(ex>=0){S.friends[ex].p=data.p||0;}else{S.friends.push({n:data.n,p:data.p||0});}
    save(); closeModal(); renderGarden();
  } catch {
    const e=document.getElementById('ferr'); if(e) e.style.display='block';
  }
}

// ═══════════════ MODAL ═══════════════

function closeMBG(e) { if(e.target===document.getElementById('modal')) closeModal(); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

// ═══════════════ BOOT ═══════════════

if(S.name&&S.plantedAt){initMain();}else{show('w');}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
